default: &default
  adapter: postgresql
  host: localhost
  port: 5432
  username: postgres
  password: postgres
  pool: 5

development:
  <<: *default
  database: zero_rust_dev

test:
  <<: *default
  database: zero_rust_test

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
  database: zero_rust_prod
